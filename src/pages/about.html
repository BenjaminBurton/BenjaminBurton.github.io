            function progress(percent, width) {
              var size = Math.round((width * percent) / 100);
              var left = "",
                taken = "",
                i;
              for (i = size; i--; ) {
                taken += "=";
              }
              if (taken.length > 0) {
                taken = taken.replace(/=$/, ">");
              }
              for (i = width - size; i--; ) {
                left += " ";
              }
              return "[" + taken + left + "] " + percent + "%";
            }

            function loading() {
              var i = 0,
                size = 30;
              prompt = term.get_prompt();
              string = progress(0, size);
              term.set_prompt(progress);
              animation = true;
              (function loop() {
                string = progress(i++, size);
                term.set_prompt(string);
                if (i < 100) {
                  timer = setTimeout(loop, 10);
                } else {
                  term
                    .echo(progress(i, size) + " [[b;green;]OK]")
                    .set_prompt(prompt);
                  animation = false;
                }
              })();

                  animation = false;
